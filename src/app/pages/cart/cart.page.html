<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Carrito</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list *ngIf="cart.length > 0; else emptyCart">
    <ion-item *ngFor="let item of cart">
      <ion-thumbnail slot="start">
        <img [src]="item.image" alt="{{ item.name }}">
      </ion-thumbnail>
      <ion-label>
        <h2>{{ item.name }}</h2>
        <p>Precio: {{ item.price | currency:'USD' }}</p>
        <p>Cantidad: {{ item.quantity }}</p>
        <p>Subtotal: {{ (item.price * item.quantity) | currency:'USD' }}</p>
      </ion-label>

      <!-- Controles + y - -->
      <div class="quantity-controls">
        <ion-button fill="solid" color="danger" size="small" (click)="decreaseQuantity(item)">-</ion-button>
        <ion-button fill="solid" color="success" size="small" (click)="increaseQuantity(item)">+</ion-button>
      </div>
    </ion-item>
  </ion-list>

  <ng-template #emptyCart>
    <div class="empty">
      <p>Tu carrito está vacío</p>
    </div>
  </ng-template>

  <!-- Resumen del carrito -->
  <div class="cart-summary" *ngIf="cart.length > 0">
    <ion-item>
      <ion-label>Total productos</ion-label>
      <ion-note slot="end">{{ totalItems }}</ion-note>
    </ion-item>
    <ion-item>
      <ion-label>Total a pagar</ion-label>
      <ion-note slot="end">{{ total | currency:'USD' }}</ion-note>
    </ion-item>
  </div>

  <!-- Botones -->
  <div class="center-button">
    <ion-button color="danger" (click)="clearCart()" [disabled]="cart.length === 0">
      Vaciar carrito
    </ion-button>
    <ion-button color="success" (click)="pagar()" [disabled]="cart.length === 0">
      Pagar
    </ion-button>
  </div>
</ion-content>
